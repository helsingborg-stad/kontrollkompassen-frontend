
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80" # HTTP
      - "8443:443" # HTTPS
      - "8443:443/udp" # HTTP/3
    volumes:
      - ./app:/app/public
      - caddy_data:/data
      - caddy_config:/config
    tty: true

# Volumes needed for Caddy certificates and configuration
volumes:
  caddy_data:
  caddy_config: